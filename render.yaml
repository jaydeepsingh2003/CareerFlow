services:
  - type: web
    name: careerflow-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: careerflow-db
          property: connectionString
      - key: REDIS_HOST
        sync: false # User to provide from manual Redis instance
      - key: REDIS_PORT
        sync: false # User to provide from manual Redis instance
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: careerflow-db
    plan: free
