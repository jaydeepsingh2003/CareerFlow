services:
  - type: web
    name: careerflow-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: careerflow-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: careerflow-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: careerflow-redis
          property: port
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: careerflow-db
    plan: free
    postgresRole: user

redises:
  - name: careerflow-redis
    plan: free
    ipAllowList: [] # Only allow internal access
